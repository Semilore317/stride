# App Info
spring.application.name=stridedotcom
server.port=9090

# Database Config
spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3306/stridedb}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL Script Initialization (moved away from automated sql scripts)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# CORS Config
cors.allowed-origins=http://localhost:5173,http://localhost:5174

# Multipart File Upload Limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# API Prefix
api.prefix=/api/v1
app.useSecureCookie=true

# JWT Expirations (in milliseconds) for testing
auth.token.access-expiration-in-millis=120000
auth.token.refresh-expiration-in-millis=300000

# JWT Secret (external file or env var)
auth.token.jwt-secret=${JWT_SECRET:@file:secrets/jwt.secret}